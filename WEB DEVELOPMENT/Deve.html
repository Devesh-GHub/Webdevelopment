<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Position</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <style>
    div::before {
      background: url('https://img.rawpixel.com/s3fs-private/rawpixel_images/website_content/rm373batch15-217-01.jpg?w=800&dpr=1&fit=default&crop=default&q=65&vib=3&con=3&usm=15&bg=F4F4F3&ixlib=js-2.2.1&s=d8bbc66e02e81095950de55fcc9347f5') no-repeat center center/cover;
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      z-index: -1;
      top: 0px;
      left: 0%;
      opacity: 0.9;
    }

    body {
      font-family: 'Jomhuria', cursive;
      /* background-repeat: no-repeat; */
    }

    li {
      list-style: none;

    }

    a {
      text-decoration: none;
      color: rgb(241, 237, 1);
    }

    #left {
      /* border: 2px solid red; */
      display: inline-block;
      position: absolute;
      left: 24px;
      top: 1%;
      /* background-color: rgb(0, 0, 0); */
      text-align: center;
      width: 15%;
    }

    #middle {
      /* border: 2px solid red; */
      display: block;
      width: 35%;
      margin: 1px auto;
      padding: 3px;
      /* background-color: beige; */
      border-radius: 34px;
    }

    #left img {
      width: 38%;
      filter: invert(100%);
      margin-bottom: 0%;
      image;
    }

    #right {
      /* border: 2px solid red; */
      display: inline-block;
      position: absolute;
      right: 34px;
      top: 1%;
      /* background-color: brown; */
    }

    .midd li {
      display: inline-block;
      padding: 6px;
      font-size: larger;
    }

    a:hover {
      text-decoration: underline;
      color: blueviolet;
    }

    .midd li a {
      color: red;
    }

    h4 {
      color: aliceblue;
      font-size: large;
      margin-top: 0%;
    }

    .btn {
      font-family: 'Jomhuria', cursive;
      cursor: pointer;
      font-size: 15px;
      padding: 2px;
      margin: 8px 4px;
      border-radius: 4px;
    }

    .btn:hover {
      background-color: beige;
      color: rgb(43, 255, 0);
    }

    .fill {
      /* border: 2px solid red; */
      border-radius: 24px;
      /* display:block; */
      margin: 150px;
      margin-left: 250px;
      width: 30%;
      padding: 5px 150px;
      padding-left: 100px;
      /* background-color: beige; */
    }

    h1 {
      margin-bottom: 0px;
      color: rgb(255, 0, 0);
    }

    h2 {
      color: rgb(255, 0, 0);
      margin-top: 2px;
    }

    h4 {
      color: rgb(255, 0, 43);
      width: auto;
    }

    #Form input {
      font-size: 13px;
      margin-right: 133px;
      margin-top: 3px;
      margin-bottom: 3px;
      padding: 6px;
      display: block;
      width: 45%;
    }
  </style>
</head>

<body>
  <header>
    <!-- Left Part -->
    <div class="navbar" id="left">
      <a href="##"></a>
      <img src="logo.jpg" alt="">
      <h4>Sri Medicals</h4>
    </div>
    <!-- Middle Part -->
    <div class="navbar" id="middle">
      <ul class="midd">
        <li><a href="##" id="active">About Us</a></li>
        <li><a href="##">Medicine</a></li>
        <li><a href="##">Shop</a></li>
        <li><a href="##">Blog</a></li>
        <!-- <li><a href="##">Contact</a></li> -->
      </ul>
    </div>
    <!-- Right Part -->
    <div class="navbar" id="right">
      <a href="##"></a>
      <button class="btn" id="btn1">Contact</button>
      <button class="btn" id="btn2">Email</button>
    </div>
  </header>
  <div class="fill">
    <h1 id="h1">Welcome to Sri Medicals</h1>
    <h2>Enter the Following Details</h2>
    <form action="form.apt" id="Form">
      <input type="text" placeholder="Enter your Name">
      <input type="text" placeholder="Enter your E-mail">
      <input type="text" placeholder="Enter your PhoneNumber">
      <input type="text" placeholder="Enter your Age">
      <button class="btn" id="btn4">submit</button>
    </form>
  </div>
</body>

</html>
