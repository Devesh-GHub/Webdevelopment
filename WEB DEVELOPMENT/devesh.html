  <script>
    const puzzle = document.getElementById('puzzle');
    const cells = Array.from(puzzle.getElementsByTagName('td'));
  
    let emptyCellIndex = 8;
    let moves = 0; 
  
    function moveTile(cell) {
      const cellIndex = cells.indexOf(cell);
      if (isAdjacent(cellIndex, emptyCellIndex)) {
        swapCells(cellIndex, emptyCellIndex);
        emptyCellIndex = cellIndex;
        moves++; 
        updateMovesDisplay(); 
      }
    }
  
    function isAdjacent(cellIndex, emptyCellIndex) {
      const rowDiff = Math.floor(cellIndex / 3) - Math.floor(emptyCellIndex / 3);
      const colDiff = cellIndex % 3 - emptyCellIndex % 3;
      return Math.abs(rowDiff) + Math.abs(colDiff) === 1;
    }
  
    function swapCells(index1, index2) {
      [cells[index1].textContent, cells[index2].textContent] = [cells[index2].textContent, cells[index1].textContent];
    }
  
    function shufflePuzzle() {
      const numbers = Array.from({ length: 9 }, (_, i) => i + 1);
      numbers[8] = '';
      moves = 0; 
  
      for (let i = numbers.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [numbers[i], numbers[j]] = [numbers[j], numbers[i]];
      }
  
      numbers.forEach((number, index) => {
        cells[index].textContent = number;
        if (number === '') {
          emptyCellIndex = index;
        }
      });
  
      updateMovesDisplay(); 
    }
  
    function solvePuzzle() {
      alert('Congrulations!! You solved the puzzle in ' + moves + ' moves.');
    }
  
    function updateMovesDisplay() {
      const movesDisplay = document.getElementById('moves-display');
      movesDisplay.textContent = 'Moves: ' + moves;
    }
  
    shufflePuzzle();
  </script>
  
</body>
