<!DOCTYPE html>
<html>

<head>
    <title>N-Queens Problem</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(to bottom, #FF6A6A, #FFD77A);
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .container {
            background-color: #FCF6F5;
            border-radius: 10px;
            box-shadow: 5px 15px 40px rgba(0, 0, 0, 0.2);
            padding: 20px;
            text-align: center;
        }

        h1 {
            color: #FF6A6A;
            font-size: 28px;
            margin: 0;
            padding: 10px 0;
        }

        .input-container {
            margin: 20px 0;
        }

        label {
            font-size: 18px;
            color: #3F3F3F;
        }

        input {
            width: 40px;
            height: 30px;
            font-size: 18px;
            text-align: center;
            border: 1px solid #FF6A6A;
            border-radius: 5px;
        }

        button {
            background-color: #FF6A6A;
            color: #fff;
            border: none;
            border-radius: 5px;
            font-size: 18px;
            padding: 10px 20px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #FF2A2A;
        }

        .chessboard-container {
            display: none;
            margin-top: 20px;
        }

        #chessboard {
            display: grid;
            grid-template-columns: repeat(var(--N), 1fr);
            width: 100%;
            padding: 10px;
        }

        .cell {
            width: 100%;
            padding-top: 100%;
            background-color: #FFD77A;
            position: relative;
            border: 1px solid #FF6A6A;
        }

        .queen {
            font-size: 2em;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #FF6A6A;
        }

        .reset-button {
            background-color: #FFD77A;
            color: #3F3F3F;
            border: none;
            border-radius: 5px;
            font-size: 18px;
            padding: 10px 20px;
            cursor: pointer;
            display: block;
            margin: 20px auto;
            transition: background-color 0.3s;
        }

        .reset-button:hover {
            background-color: #FFB54E;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>N-Queens Problem</h1>
        <div class="input-container">
            <label for="queensInput">Enter value for N:</label>
            <input type="number" id="queensInput" min="4" max="12" value="8">
            <button id="submitButton">Start</button>
        </div>
        <div class="chessboard-container">
            <div id="chessboard" class="chessboard"></div>
            <button class="reset-button" id="resetButton">Exit</button>
        </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        $(document).ready(function () {
            $('#submitButton').click(function () {
                const N = parseInt($('#queensInput').val());
                if (N >= 4 && N <= 12) {
                    $('.input-container').hide();
                    $('.chessboard-container').show();
                    solveNQueens(N);
                } else {
                    alert("Please enter a valid N(4-12).");
                }
            });
            $('#resetButton').click(function () {
                $('.input-container').show();
                $('.chessboard-container').hide();
            });
        });
        function solveNQueens(N) {
            document.documentElement.style.setProperty('--N', N);
            const chessboard = Array(N).fill(null).map(() => Array(N).fill(false));
            function isSafe(row, col) {
                // Checking from top
                for (let i = 0; i < row; i++) {
                    if (chessboard[i][col]) return false;
                }
                // Checking diagonally left
                for (let i = row, j = col; i >= 0 && j >= 0; i--, j--) {
                    if (chessboard[i][j]) return false;
                }
                // Checking diagonally rignt
                for (let i = row, j = col; i >= 0 && j < N; i--, j++) {
                    if (chessboard[i][j]) return false;
                }
                return true;
            }
            function solve(row) {
                if (row === N) {
                    displaySolution(chessboard);
                    return;
                }
                for (let col = 0; col < N; col++) {
                    if (isSafe(row, col)) {
                        chessboard[row][col] = true;
                        solve(row + 1);
                        chessboard[row][col] = false;
                    }
                }
            }
            function displaySolution(chessboard) {
                $('#chessboard').empty();
                for (let i = 0; i < N; i++) {
                    for (let j = 0; j < N; j++) {
                        const cell = $('<div class="cell"></div>');
                        if (chessboard[i][j]) {
                            cell.append('<span class="queen">♛</span>');
                        }
                        $('#chessboard').append(cell);
                    }
                }
            }
            solve(0);
        }
    </script>
</body>

</html>
